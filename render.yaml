services:
  - type: web
    name: celebrity-look-alike
    env: static
    envVars:
      - key: NODE_VERSION
        value: 16.14.0
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
      - key: CI
        value: "false"
    buildCommand: |
      npm install --legacy-peer-deps
      npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: '/*'
        destination: '/index.html'
